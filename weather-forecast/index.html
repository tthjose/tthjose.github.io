<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="vi-VN">
<head>
    <meta charset="utf-8">
    <title>Hanoi Weather observation and Alert</title>
    <meta http-equiv="refresh" content="900" />     
    <link rel="stylesheet" type="text/css" href="StyleSheet1.css" />
    <link rel="icon" type="image/ico" sizes="16x16" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="192x192" href="web-app-manifest-192x192.png" />
    <link rel="manifest" href="asset/pwa/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <div id="icon-wrap">
            <img src="icon.png" alt="icon">
        </div>
        <div>
            <p><span id="title"> Weather Observer and Forecast </span> </p>
            <p><div id="subtitle">HANOI <span><svg id="subtitle-dropdown-icon"><image href="asset/icons/angle-down.svg"/></svg></span>
                <div id="header-dropdown-content">
                        <button><a href="td.html">Tam Diep</a></button>
                        <button><a href="nd.html">Yen Tho</a></button>
                </div>
            </div>
            </p> 
        </div>
        <span id="time"></span>
    </header>
    <hr>
    <main>
        <div id="frame-1">
                    <div id="frame-1-1-1">
                        <div id="frame-1-1-1-title"><p>Current</p></div>
                        <div id="current-temp-wrap" style="grid-area: info1"><span id="current-temp"></span>°C</div>
                        <div id="current-weather-wrap" style="grid-area: info2"><span id="current-weather"></span></div>
                        <div id="frame-1-1-1-subcontent">hum: <span id="current-humid"></span>% AQI: <span id="current-aqi"></span></div>
                    </div>
                    <div id="frame-1-1-2">
                        <h3>Warnings <span id="overall"></span></h3>
                        <h4>for: <span id="heatwave"></span><span id="humid"> </span><span id="pollution"></span><span id="coldsurge"></span><span id="thunderstorm"></span></h4>
                    </div>
                    <div id="frame-1-1-3">
                        <div class="weather-forecast" id="weather-forecast-0">
                            <div class="weather-forecast-date" id="wFD-0"></div>
                            <div class="weather-forecast-icon"><span id="wFI-0"></span></div>
                            <div class="weather-forecast-temperature"><span id="wFT-0"></span></div>
                            <div class="weather-forecast-warning" id="wFW-0">   
                            </div>
                        </div>
                        <div class="weather-forecast" id="weather-forecast-1">
                            <div class="weather-forecast-date" id="wFD-1"></div>
                            <div class="weather-forecast-icon" id="wFI-1"></div>
                            <div class="weather-forecast-temperature" id="wFT-1"></div>
                            <div class="weather-forecast-warning" id="wFW-1"></div>
                        </div>
                        <div class="weather-forecast" id="weather-forecast-2">
                            <div class="weather-forecast-date" id="wFD-2"></div>
                            <div class="weather-forecast-icon" id="wFI-2"></div>
                            <div class="weather-forecast-temperature" id="wFT-2"></div>
                            <div class="weather-forecast-warning" id="wFW-2"></div>
                        </div>
                    </div>
        </div>
        <h3 id="frame-2-title">RADAR AND SATELLITE IMAGERY ></h3>
        <div id="frame-2">
                <iframe class="frame-component" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=km/h&zoom=9&overlay=satellite&product=satellite&level=surface&lat=20.997&lon=105.826&message=true" sandbox ="allow-scripts" frameborder="0"></iframe>
        </div>
        <div id="frame-3">
                <iframe class="frame-component" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=km/h&zoom=9&overlay=radar&product=radar&level=surface&lat=20.972&lon=105.81&pressure=true&message=true" sandbox ="allow-scripts" frameborder="0"></iframe>
        </div>
        <h3>OTHER REGIONS > </h3>
        <div id="frame-4">
            <a class="weatherwidget-io" href="https://forecast7.com/en/20d25105d97/ninh-binh/" data-label_1="NINH BÌNH" data-label_2="7-DAY WEATHER" data-icons="Climacons" data-theme="pure" >NINH BÌNH 7-DAY WEATHER</a>
            <script>
                !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');  
            </script>
            </div>
        </div>
        <div id="frame-5">
            <a class="weatherwidget-io" href="https://forecast7.com/en/40d42n3d70/madrid/" data-label_1="MADRID" data-label_2="7-DAY WEATHER" data-font="Noto Sans" data-icons="Climacons" data-theme="pure" >MADRID 7-DAY WEATHER</a>
            <script>
                !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
            </script>
        </div>
    </main>
    <footer>
            <p> For Milk, with love ❤️ </p> 
    </footer>
    <script src="service_Time.js"> </script>
    <script src="asset/data.js"></script>
</body>
</html>
